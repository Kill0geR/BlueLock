<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: transparent;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }

  .widget {
    width: 265px;
    padding: 14px 16px;
    background: rgba(4, 18, 45, 0.88);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(0, 212, 255, 0.25);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(100,181,246,0.1);
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  .widget.minimized .hotkeys,
  .widget.minimized .message-bar { display: none; }
  .widget.minimized .header { margin-bottom: 0; }

  .minimize-btn {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(100,181,246,0.08); border: 1px solid rgba(100,181,246,0.15);
    color: rgba(180,215,255,0.4); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; transition: all 0.2s;
    -webkit-app-region: no-drag; flex-shrink: 0; margin-left: 6px;
  }
  .minimize-btn:hover { background: rgba(100,181,246,0.18); color: #64b5f6; border-color: rgba(100,181,246,0.3); }

  .widget::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: radial-gradient(circle, #00d4ff, #0d6efd);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(0,212,255,0.8);
  }

  .logo-text {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #64b5f6;
    text-transform: uppercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 9px;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
  }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
    animation: pulse 2s infinite;
  }

  .status-dot.recording { background: #ff4444; box-shadow: 0 0 6px #ff4444; animation: pulse 0.8s infinite; }
  .status-dot.scanning  { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }

  .status-text { color: #00ff88; }
  .status-text.recording { color: #ff8080; }
  .status-text.scanning  { color: #ffcc44; }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .hotkeys {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    -webkit-app-region: no-drag;
  }

  .hotkey {
    flex: 1;
    padding: 8px 6px;
    background: rgba(13, 110, 253, 0.1);
    border: 1px solid rgba(100, 181, 246, 0.15);
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .hotkey:hover {
    background: rgba(13, 110, 253, 0.2);
    border-color: rgba(0,212,255,0.35);
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }

  .hotkey:active { transform: scale(0.96); }

  .key-label {
    display: block;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    color: #00d4ff;
    line-height: 1;
  }

  .key-desc {
    display: block;
    font-size: 9px;
    color: rgba(180,215,255,0.5);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .message-bar {
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: all 0.3s ease;
    min-height: 32px;
  }

  .message-bar.idle {
    background: rgba(100,181,246,0.05);
    border: 1px solid rgba(100,181,246,0.1);
    color: rgba(180,215,255,0.4);
  }

  .message-bar.recording {
    background: rgba(255,60,60,0.1);
    border: 1px solid rgba(255,60,60,0.25);
    color: #ff8080;
    animation: recordPulse 1.5s infinite;
  }

  .message-bar.success {
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    color: #00ff88;
  }

  .message-bar.scanning {
    background: rgba(255,170,0,0.08);
    border: 1px solid rgba(255,170,0,0.2);
    color: #ffcc44;
  }

  @keyframes recordPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .msg-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .recording .msg-dot { background: #ff4444; box-shadow: 0 0 6px #ff4444; animation: pulse 0.8s infinite; }
  .success .msg-dot   { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .scanning .msg-dot  { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; animation: pulse 1s infinite; }
  .idle .msg-dot      { background: rgba(100,181,246,0.3); }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">BlueLock</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="status" id="statusArea">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">AKTIV</span>
      </div>
      <div class="minimize-btn" onclick="toggleMinimize()" id="minBtn">—</div>
    </div>
  </div>

  <div class="hotkeys">
    <div class="hotkey" onclick="triggerF3()">
      <span class="key-label">F3</span>
      <span class="key-desc">Aufnahme</span>
    </div>
    <div class="hotkey" onclick="triggerF4()">
      <span class="key-label">F4</span>
      <span class="key-desc">Autofill</span>
    </div>
  </div>

  <div class="message-bar idle" id="messageBar">
    <div class="msg-dot"></div>
    <span id="messageText">Bereit — warte auf Hotkey</span>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');

const messageBar = document.getElementById('messageBar');
const messageText = document.getElementById('messageText');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let messageTimeout = null;

function setMessage(type, text, autoClear = true) {
  messageBar.className = `message-bar ${type}`;
  messageText.textContent = text;

  // Update status dot
  statusDot.className = `status-dot ${type === 'recording' ? 'recording' : type === 'scanning' ? 'scanning' : ''}`;
  statusText.className = `status-text ${type === 'recording' ? 'recording' : type === 'scanning' ? 'scanning' : ''}`;
  statusText.textContent = type === 'recording' ? 'AUFNAHME' : type === 'scanning' ? 'SCAN' : 'AKTIV';

  if (messageTimeout) clearTimeout(messageTimeout);
  if (autoClear && type === 'success') {
    messageTimeout = setTimeout(() => setMessage('idle', 'Bereit — warte auf Hotkey', false), 3000);
  }
}

// Listen for events from main process
ipcRenderer.on('recording-started', () => {
  setMessage('recording', 'Eingabe wird aufgezeichnet...', false);
});

ipcRenderer.on('recording-stopped', (event, result) => {
  if (result === 'saved') {
    setMessage('success', '✓ Ja, gespeichert!');
  } else {
    setMessage('idle', 'Bereit — warte auf Hotkey', false);
  }
});

ipcRenderer.on('autofill-done', (event, appName) => {
  setMessage('success', `✓ Daten erfolgreich hinzugefügt!`);
});

ipcRenderer.on('autofill-not-found', () => {
  setMessage('idle', '⚠ Keine passende App gefunden', false);
  setTimeout(() => setMessage('idle', 'Bereit — warte auf Hotkey', false), 3000);
});

ipcRenderer.on('autofill-scanning', () => {
  setMessage('scanning', 'KI scannt Bildschirm...', false);
});

// Manual trigger buttons (click on F3/F4 in widget)
async function triggerF3() {
  setMessage('recording', 'Eingabe wird aufgezeichnet...', false);
  const res = await fetch('http://localhost:8000/screenshot');
  const { screenshot } = await res.json();
  ipcRenderer.send('trigger-record-manual', screenshot);
}

async function triggerF4() {
  setMessage('scanning', 'KI scannt Bildschirm...', false);
  const res = await fetch('http://localhost:8000/autofill', { method: 'POST' });
  const data = await res.json();
  if (data.success) {
    setMessage('success', '✓ Daten erfolgreich hinzugefügt!');
  } else {
    setMessage('idle', '⚠ Keine passende App gefunden', false);
    setTimeout(() => setMessage('idle', 'Bereit — warte auf Hotkey', false), 3000);
  }
}

function toggleMinimize() {
  ipcRenderer.send('minimize-widget');
}
</script>
</body>
</html>
